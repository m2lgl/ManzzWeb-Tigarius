name: Deploy-Tigarius

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Update ke v4 biar gak deprecated!

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy manzz-ts
        run: supabase functions deploy manzz-ts --project-ref ${{ secrets.PROJECT_ID }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Ikutin kemauan GitHub 2026!
 
