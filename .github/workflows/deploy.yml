name: Deploy-Tigarius
on: [push] # Tiap lu push, dia langsung deploy!
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/setup-cli@v1
      - run: supabase functions deploy manzz-ts --project-ref ${{ secrets.PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
concurrency:
  
